name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile python.py train_models.py app.py

      - name: Build Docker image
        run: docker build . --tag al-logic:latest

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Smoke test Flask app
        run: |
          python -c "from app import app; client = app.test_client(); response = client.get('/health'); print(response.status_code); assert response.status_code == 200"
